<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
        colors: {
          teal: {
            50:  '#F0FDFA',
            100: '#CCFBF1',
            200: '#99F6E4',
            300: '#5EEAD4',
            400: '#2DD4BF',
            500: '#14B8A6',
            600: '#0D9488',

<style>
  html, body { height: 100%; }
  body {
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    background:
      radial-gradient(1200px 600px at 20% 10%, #E6FFFA 0%, transparent 60%),
      radial-gradient(1000px 600px at 100% 100%, #F0FDFA 0%, transparent 55%),
      linear-gradient(180deg, #F5FAF9 0%, #F3F4F6 100%);
    color: #111827;
    -webkit-font-smoothing: antialiased;
  }
  /* Hide scrollbars inside the phone */
  .phone-scroll::-webkit-scrollbar { width: 0; height: 0; }
  .phone-scroll { scrollbar-width: none; }

  /* Marching dots for "playing" video */
  @keyframes pulse-ring {
    0%   { transform: scale(1);   opacity: 0.55; }
    100% { transform: scale(1.8); opacity: 0;    }
  }
  .pulse-ring::before, .pulse-ring::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 9999px;
    background: rgba(20, 184, 166, 0.45);
    animation: pulse-ring 1.4s cubic-bezier(.22,.61,.36,1) infinite;
  }
  .pulse-ring::after { animation-delay: 0.7s; }

  /* Screen slide transition */
  .screen-enter      { transform: translateX(100%); }
  .screen-enter-to   { transform: translateX(0); transition: transform 320ms cubic-bezier(.22,.61,.36,1); }
  .screen-leave      { transform: translateX(0); }
  .screen-leave-to   { transform: translateX(100%); transition: transform 320ms cubic-bezier(.22,.61,.36,1); }
  .screen-back-enter { transform: translateX(-8%); opacity: 0.6; }
  .screen-back-enter-to { transform: translateX(0); opacity: 1; transition: transform 320ms ease, opacity 320ms ease; }
  .screen-back-leave-to { transform: translateX(100%); transition: transform 320ms cubic-bezier(.22,.61,.36,1); }

  /* Progress bar grow */
  @keyframes grow-bar { from { width: 0%; } }
  .grow-bar { animation: grow-bar 900ms cubic-bezier(.22,.61,.36,1) both; }

  /* Fade for tab switches */
  .fade-enter    { opacity: 0; }
  .fade-enter-to { opacity: 1; transition: opacity 180ms ease; }

  /* Success check pop */
  @keyframes pop {
    0%   { transform: scale(0.6); opacity: 0; }
    60%  { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1);    opacity: 1; }
  }
  .pop { animation: pop 360ms cubic-bezier(.22,.61,.36,1) both; }

  /* Splash bob */
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .bob { animation: bob 3.2s ease-in-out infinite; }

  /* Tweak primary-color overrides */
  :root { --twk-primary: #14B8A6; --twk-primary-dark: #0F766E; }
  .bg-teal-500 { background-color: var(--twk-primary) !important; }
  .bg-teal-700, .active\:bg-teal-700:active { background-color: var(--twk-primary-dark) !important; }
  .text-teal-500 { color: var(--twk-primary) !important; }
  .text-teal-600, .text-teal-700, .text-teal-800 { color: var(--twk-primary-dark) !important; }
  .border-teal-500 { border-color: var(--twk-primary) !important; }
  .from-teal-500 { --tw-gradient-from: var(--twk-primary) !important; --tw-gradient-to: transparent !important; --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to) !important; }
  .to-teal-700 { --tw-gradient-to: var(--twk-primary-dark) !important; }

  /* ── Responsive phone frame ───────────────────────────────────────────────
     On small screens (≤430px): strip the bezel and fill the whole viewport
     so the app feels native on a real phone browser.
     On larger screens the phone frame stays centred as a preview.          */
  @media (max-width: 430px) {
    .phone-host {
      padding: 0 !important;
      align-items: flex-start !important;
      justify-content: flex-start !important;
    }
    .phone-frame-outer {
      width: 100vw !important;
      height: 100svh !important; /* svh = small-viewport height (avoids mobile toolbar overlap) */
      height: 100vh;             /* fallback for older browsers */
    }
    /* Hide the decorative bezel on mobile — it just wastes space */
    .phone-frame-bezel,
    .phone-frame-inner-bezel { display: none !important; }
    /* Make the screen fill the frame with no rounded corners */
    .phone-frame-screen { inset: 0 !important; border-radius: 0 !important; }
    .phone-dynamic-island { display: none !important; }
  }

  /* On medium screens (tablet / small laptop) scale down the frame to fit */
  @media (min-width: 431px) and (max-height: 920px) {
    .phone-frame-outer {
      transform: scale(0.88);
      transform-origin: center center;
    }
  }
</style>

<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="react">

const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;overflow-x:hidden;min-height:0;
    scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-body::-webkit-scrollbar{width:8px}
  .twk-body::-webkit-scrollbar-track{background:transparent;margin:2px}
  .twk-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px;
    border:2px solid transparent;background-clip:content-box}
  .twk-body::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.25);
    border:2px solid transparent;background-clip:content-box}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;
    color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}

  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}

  .twk-field{appearance:none;width:100%;height:26px;padding:0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;
    background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
  .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}
  select.twk-field{padding-right:22px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.5)' d='M0 0h10L5 6z'/></svg>");
    background-repeat:no-repeat;background-position:right 8px center}

  .twk-slider{appearance:none;-webkit-appearance:none;width:100%;height:4px;margin:6px 0;
    border-radius:999px;background:rgba(0,0,0,.12);outline:none}
  .twk-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
    width:14px;height:14px;border-radius:50%;background:#fff;
    border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}
  .twk-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
    background:#fff;border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}

  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;
    background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);
    transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
  .twk-seg.dragging .twk-seg-thumb{transition:none}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;
    background:transparent;color:inherit;font:inherit;font-weight:500;height:22px;
    border-radius:6px;cursor:default;padding:0}

  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
    background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
    background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}

  .twk-num{display:flex;align-items:center;height:26px;padding:0 0 0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;background:rgba(255,255,255,.6)}
  .twk-num-lbl{font-weight:500;color:rgba(41,38,27,.6);cursor:ew-resize;
    user-select:none;padding-right:8px}
  .twk-num input{flex:1;min-width:0;height:100%;border:0;background:transparent;
    font:inherit;font-variant-numeric:tabular-nums;text-align:right;padding:0 8px 0 0;
    outline:none;color:inherit;-moz-appearance:textfield}
  .twk-num input::-webkit-inner-spin-button,.twk-num input::-webkit-outer-spin-button{
    -webkit-appearance:none;margin:0}
  .twk-num-unit{padding-right:8px;color:rgba(41,38,27,.45)}

  .twk-btn{appearance:none;height:26px;padding:0 12px;border:0;border-radius:7px;
    background:rgba(0,0,0,.78);color:#fff;font:inherit;font-weight:500;cursor:default}
  .twk-btn:hover{background:rgba(0,0,0,.88)}
  .twk-btn.secondary{background:rgba(0,0,0,.06);color:inherit}
  .twk-btn.secondary:hover{background:rgba(0,0,0,.1)}

  .twk-swatch{appearance:none;-webkit-appearance:none;width:56px;height:22px;
    border:.5px solid rgba(0,0,0,.1);border-radius:6px;padding:0;cursor:default;
    background:transparent;flex-shrink:0}
  .twk-swatch::-webkit-color-swatch-wrapper{padding:0}

  .twk-swatch::-moz-color-swatch{border:0;border-radius:5.5px}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  
  
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

const Icon = ({ d, size = 22, stroke = 1.8, fill = 'none', className = '', children }) => (
  <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
       fill={fill} stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round"
       className={className}>
    {d ? <path d={d} /> : children}

const ScreenTransition = ({ keyId, direction, children }) => {
  const [prev, setPrev] = React.useState({ keyId, children, direction: 'none' });
  const [current, setCurrent] = React.useState({ keyId, children, direction: 'none' });
  const [animating, setAnimating] = React.useState(false);

  React.useEffect(() => {
    if (keyId === current.keyId) return;
    setPrev(current);
    setCurrent({ keyId, children, direction });
    setAnimating(true);
    const t = setTimeout(() => setAnimating(false), 340);
    return () => clearTimeout(t);
    
  }, [keyId]);

  
  React.useEffect(() => {
    if (keyId === current.keyId) {
      setCurrent((c) => ({ ...c, children }));
    }
  }, [children]); 

  const dir = current.direction;
  return (
    <div className="absolute inset-0 overflow-hidden">
      {animating && (
        <div
          className="absolute inset-0 will-change-transform"
          style={{
            transform: dir === 'back' ? 'translateX(0)' : 'translateX(0)',
            animation: dir === 'back'
              ? 'none'
              : 'none',
          }}
        >
          {}
          <div
            className="absolute inset-0"
            style={{
              transform: dir === 'forward'
                ? 'translateX(0)'
                : dir === 'back'
                ? 'translateX(0)'
                : 'translateX(0)',
              animation: dir === 'forward'
                ? 'slideOutLeft 320ms cubic-bezier(.22,.61,.36,1) forwards'
                : dir === 'back'
                ? 'slideOutRight 320ms cubic-bezier(.22,.61,.36,1) forwards'
                : 'none',
            }}
          >
            {prev.children}
          </div>
        </div>
      )}
      {}
      <div
        key={current.keyId}
        className="absolute inset-0"
        style={{
          animation: animating && dir === 'forward'
            ? 'slideInRight 320ms cubic-bezier(.22,.61,.36,1) both'
            : animating && dir === 'back'
            ? 'slideInLeft 320ms cubic-bezier(.22,.61,.36,1) both'
            : animating && dir === 'fade'
            ? 'fadeIn 180ms ease both'
            : 'none',
        }}
      >
        {current.children}
      </div>
    </div>
  );
};

// SignupScreen: collects user details, saves a new account to localStorage,
// then starts a session for the new user.
const SignupScreen = ({ onBack, onSignup, onLogin }) => {
  const [name, setName]           = React.useState('');
  const [email, setEmail]         = React.useState('');
  const [password, setPassword]   = React.useState('');
  const [condition, setCondition] = React.useState('Knee rehabilitation');
  const [agreed, setAgreed]       = React.useState(false);
  const [error, setError]         = React.useState('');

  // Physiotherapy conditions the user can pick from
  const CONDITIONS = [
    'Knee rehabilitation',
    'Lower back pain',
    'Shoulder injury',
    'Hip replacement recovery',
    'Post-surgery rehab',
    'Neck pain',
    'General physiotherapy',
  ];

  const handleSignup = () => {
    setError('');
    // Validate inputs
    if (!name.trim())                          { setError('Please enter your full name.'); return; }
    if (!email.trim() || !/\S+@\S+\.\S+/.test(email)) { setError('Please enter a valid email address.'); return; }
    if (password.length < 8)                   { setError('Password must be at least 8 characters.'); return; }
    if (!agreed)                               { setError('Please agree to the Terms and Privacy Policy.'); return; }

    // Check if this email is already registered
    const users = JSON.parse(localStorage.getItem('physiocare_users') || '[]');
    if (users.find(u => u.email.toLowerCase() === email.trim().toLowerCase())) {
      setError('An account with this email already exists. Try logging in.');
      return;
    }

    // Build the new user record
    // NOTE: passwords are stored in plain text — this is a prototype only, not for production.
    const newUser = {
      id:        Date.now().toString(),
      name:      name.trim(),
      email:     email.trim().toLowerCase(),
      password,
      condition,
      streakDays: 0,
      createdAt: new Date().toISOString(),
    };

    // Save to localStorage and start a session
    users.push(newUser);
    localStorage.setItem('physiocare_users', JSON.stringify(users));
    localStorage.setItem('physiocare_session', JSON.stringify({ email: newUser.email }));
    onSignup(newUser); // pass the full user object up to App
  };

  return (
  <Screen>
    <NavHeader title="" onBack={onBack} />
    <div className="px-6 pt-2 pb-10">
      <h1 className="text-[26px] font-bold text-gray-900 leading-tight">Create your account</h1>
      <p className="text-[13px] text-gray-500 mt-1">A few details to personalise your plan.</p>

      <div className="mt-7 space-y-4">
        <TextField label="Full name" placeholder="E.g. Musa John"
          Icon={IconUser} value={name} onChange={setName} />
        <TextField label="Email" type="email" placeholder="your@email.com"
          Icon={IconMail} value={email} onChange={setEmail} />
        <TextField label="Password" type="password" placeholder="At least 8 characters"
          Icon={IconLock} value={password} onChange={setPassword} />

        {/* Condition / goal picker */}
        <label className="block">
          <div className="text-[12px] font-medium text-gray-600 mb-1.5">Condition / goal</div>
          <div className="h-[52px] rounded-[12px] border border-gray-200 bg-white flex items-center px-3 focus-within:border-teal-500 transition-colors">
            <IconHeart size={18} className="text-gray-400 mr-2 shrink-0" />
            <select
              value={condition}
              onChange={(e) => setCondition(e.target.value)}
              className="flex-1 bg-transparent outline-none text-[14px] text-gray-900 appearance-none cursor-pointer"
            >
              {CONDITIONS.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </label>
      </div>

      {/* Validation error */}
      {error && (
        <div className="mt-3 p-3 rounded-[10px] bg-red-50 border border-red-100 text-red-700 text-[12px] font-medium">
          {error}
        </div>
      )}

      <label className="flex items-start gap-2.5 mt-4">
        <input type="checkbox" checked={agreed} onChange={(e) => setAgreed(e.target.checked)}
          className="mt-0.5 h-4 w-4 rounded text-teal-500 accent-teal-500" />
        <span className="text-[12px] text-gray-500 leading-snug">
          I agree to the <span className="text-teal-700 font-semibold">Terms</span> and
          <span className="text-teal-700 font-semibold"> Privacy Policy</span>.
        </span>
      </label>

      <div className="mt-6">
        <PrimaryButton onClick={handleSignup}>Create account</PrimaryButton>
      </div>

      <div className="mt-7 text-center text-[13px] text-gray-500">
        Already have an account? <button onClick={onLogin} className="text-teal-700 font-semibold">Log in</button>
      </div>
    </div>
  </Screen>
  );
};

const calculateStreak = (activeDates) => {
  if (!activeDates || activeDates.length === 0) return 0;
  const today = new Date().toISOString().slice(0, 10);
  let streak = 0;
  let d = new Date(today);
  while (true) {
    const s = d.toISOString().slice(0, 10);
    if (activeDates.includes(s)) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return streak;
};

const getProgress = (email) => {
  const raw = localStorage.getItem('physiocare_progress_' + email);
  return raw ? JSON.parse(raw) : { completedExercises: [], activeDates: [] };
};

const saveProgress = (email, progress) => {
  localStorage.setItem('physiocare_progress_' + email, JSON.stringify(progress));
  const users = JSON.parse(localStorage.getItem('physiocare_users') || '[]');
  const idx = users.findIndex(u => u.email === email);
  if (idx !== -1) {
    users[idx] = { ...users[idx], streakDays: calculateStreak(progress.activeDates) };
    localStorage.setItem('physiocare_users', JSON.stringify(users));
  }
};

const RemindersScreen = ({ onBack }) => {
  const t = useT();
  const storageKey = 'physiocare_reminders_' + t.email;
  const defaultItems = [
    { id: 1, label: 'Morning exercise session', time: '07:30', days: 'Every day', on: false },
    { id: 2, label: 'Hydration check', time: '11:00', days: 'Weekdays', on: false },
    { id: 3, label: 'Evening stretches', time: '20:00', days: 'Mon, Wed, Fri', on: false },
    { id: 4, label: 'Pain check-in', time: '21:30', days: 'Every day', on: false },
  ];

  const [items, setItems] = React.useState(() => {
    const saved = localStorage.getItem(storageKey);
    return saved ? JSON.parse(saved) : defaultItems;
  });
  const [showAdd, setShowAdd] = React.useState(false);
  const [newLabel, setNewLabel] = React.useState('');
  const [newTime, setNewTime] = React.useState('08:00');
  const [permDenied, setPermDenied] = React.useState(false);

  const scheduleNotif = (label, time) => {
    if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
    const [h, m] = time.split(':').map(Number);
    const fire = new Date(); fire.setHours(h, m, 0, 0);
    if (fire <= new Date()) fire.setDate(fire.getDate() + 1);
    setTimeout(() => new Notification('PhysioCare', { body: label }), fire - new Date());
  };

  const persist = (updated) => {
    setItems(updated);
    localStorage.setItem(storageKey, JSON.stringify(updated));
  };

  const doToggle = (id) => {
    const updated = items.map(it => {
      if (it.id !== id) return it;
      const next = { ...it, on: !it.on };
      if (next.on) scheduleNotif(next.label, next.time);
      return next;
    });
    persist(updated);
  };

  const toggle = (id) => {
    if (typeof Notification === 'undefined') { doToggle(id); return; }
    if (Notification.permission === 'granted') { doToggle(id); return; }
    if (Notification.permission === 'denied') { setPermDenied(true); doToggle(id); return; }
    Notification.requestPermission().then(p => { if (p === 'granted') doToggle(id); else { setPermDenied(true); doToggle(id); } });
  };

  const addReminder = () => {
    if (!newLabel.trim()) return;
    const item = { id: Date.now(), label: newLabel.trim(), time: newTime, days: 'Every day', on: true };
    scheduleNotif(item.label, item.time);
    persist([...items, item]);
    setNewLabel(''); setNewTime('08:00'); setShowAdd(false);
  };

  const removeReminder = (id) => persist(items.filter(it => it.id !== id));

  const fmt12 = (t24) => {
    const [h, m] = t24.split(':').map(Number);
    const ap = h >= 12 ? 'PM' : 'AM';
    return ((h % 12) || 12) + ':' + String(m).padStart(2, '0') + ' ' + ap;
  };

  return (
    <Screen bg="bg-[#F7FAF9]">
      <NavHeader title="Reminders" onBack={onBack} right={
        <button onClick={() => setShowAdd(s => !s)}
          className="h-9 w-9 rounded-full bg-teal-500 text-white flex items-center justify-center">
          <span className="text-lg font-semibold leading-none -mt-0.5">{showAdd ? '×' : '+'}</span>
        </button>
      } />

      {permDenied && (
        <div className="mx-5 mt-2 p-3 rounded-[10px] bg-amber-50 border border-amber-100 text-amber-800 text-[12px]">
          Notifications are blocked. Enable them in your browser settings to receive reminders.
        </div>
      )}

      {showAdd && (
        <div className="mx-5 mt-3">
          <Card className="p-4 space-y-3">
            <div className="text-[13px] font-semibold text-gray-900">New reminder</div>
            <div className="h-[44px] rounded-[10px] border border-gray-200 bg-white flex items-center px-3 focus-within:border-teal-500">
              <input
                type="text" placeholder="Reminder label" value={newLabel}
                onChange={e => setNewLabel(e.target.value)}
                className="flex-1 bg-transparent outline-none text-[13px] text-gray-900 placeholder:text-gray-400"
              />
            </div>
            <div className="h-[44px] rounded-[10px] border border-gray-200 bg-white flex items-center px-3 focus-within:border-teal-500">
              <input
                type="time" value={newTime} onChange={e => setNewTime(e.target.value)}
                className="flex-1 bg-transparent outline-none text-[13px] text-gray-900"
              />
            </div>
            <button onClick={addReminder}
              className="w-full h-11 rounded-[10px] bg-teal-500 text-white text-[13px] font-semibold active:bg-teal-700">
              Add reminder
            </button>
          </Card>
        </div>
      )}

      <div className="px-5 mt-4">
        <div className="text-[11px] font-semibold text-gray-400 tracking-wider mb-2">YOUR REMINDERS</div>
        {items.length === 0 ? (
          <Card className="p-6 flex flex-col items-center text-center gap-2">
            <IconBell size={28} className="text-gray-300" />
            <div className="text-[13px] font-semibold text-gray-500">No reminders yet</div>
            <div className="text-[12px] text-gray-400">Tap + to add your first reminder</div>
          </Card>
        ) : (
          <Card className="divide-y divide-gray-100">
            {items.map((it) => (
              <div key={it.id} className="p-3.5 flex items-center gap-3">
                <div className={`h-9 w-9 rounded-[10px] flex items-center justify-center shrink-0 ${it.on ? 'bg-teal-100 text-teal-700' : 'bg-gray-100 text-gray-400'}`}>
                  <IconBell size={16} />
                </div>
                <div className="flex-1 min-w-0">
                  <div className={`text-[13px] font-semibold truncate ${it.on ? 'text-gray-900' : 'text-gray-400'}`}>{it.label}</div>
                  <div className="text-[11px] text-gray-500">{fmt12(it.time)} · {it.days}</div>
                </div>
                <div className="flex items-center gap-2">
                  <button onClick={() => toggle(it.id)}
                    className={`relative w-11 h-[26px] rounded-full transition-colors ${it.on ? 'bg-teal-500' : 'bg-gray-200'}`}>
                    <span className={`absolute top-[3px] h-5 w-5 rounded-full bg-white shadow transition-transform ${it.on ? 'translate-x-[22px]' : 'translate-x-[3px]'}`} />
                  </button>
                  <button onClick={() => removeReminder(it.id)}
                    className="h-7 w-7 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 active:bg-red-50 active:text-red-500 text-[14px] font-bold">
                    ×
                  </button>
                </div>
              </div>
            ))}
          </Card>
        )}
        <div className="mt-5 mb-6 text-[11px] text-gray-400 text-center">
          PhysioCare by Micy · Stay consistent to recover faster.
        </div>
      </div>
    </Screen>
  );
};

const PersonalInfoScreen = ({ onBack, onSave }) => {
  const t = useT();

  
  const [name,      setName]      = React.useState(t.patientFull);
  const [email,     setEmail]     = React.useState(t.email);
  const [phone,     setPhone]     = React.useState(t.phone);
  const [age,       setAge]       = React.useState(t.age);
  const [gender,    setGender]    = React.useState(t.gender);
  const [condition, setCondition] = React.useState(t.condition);
  const [emergency, setEmergency] = React.useState(t.emergencyContact);
  const [error,     setError]     = React.useState('');
  const [success,   setSuccess]   = React.useState(false);

  const CONDITIONS = [
    'Knee rehabilitation', 'Lower back pain', 'Shoulder injury',
    'Hip replacement recovery', 'Post-surgery rehab', 'Neck pain', 'General physiotherapy',
  ];
  const GENDERS = ['Male', 'Female', 'Non-binary', 'Prefer not to say'];

  const handleSave = () => {
    setError('');
    if (!name.trim())                                   { setError('Full name is required.'); return; }
    if (!email.trim() || !/\S+@\S+\.\S+/.test(email)) { setError('Please enter a valid email address.'); return; }

    
    const users = JSON.parse(localStorage.getItem('physiocare_users') || '[]');

    
    const idx = users.findIndex(u => u.email === t.email);
    if (idx === -1) { setError('Account not found. Please log out and back in.'); return; }

    
    const emailTaken = users.some((u, i) => i !== idx && u.email.toLowerCase() === email.trim().toLowerCase());
    if (emailTaken) { setError('That email is already used by another account.'); return; }

    
    const updatedUser = {
      ...users[idx],
      name:             name.trim(),
      email:            email.trim().toLowerCase(),
      phone:            phone.trim(),
      age,
      gender,
      condition,
      emergencyContact: emergency.trim(),
    };

    
    users[idx] = updatedUser;
    localStorage.setItem('physiocare_users', JSON.stringify(users));

    
    localStorage.setItem('physiocare_session', JSON.stringify({ email: updatedUser.email }));

    
    onSave(updatedUser);

    setSuccess(true);
    setTimeout(() => setSuccess(false), 2500);

  return (
    <Screen bg="bg-[#F7FAF9]">

          Icon={IconPhone} value={phone} onChange={setPhone} />
        <TextField label="Age" placeholder="E.g. 28"
          Icon={IconUser} value={age} onChange={setAge} />

        {}
        <label className="block">
          <div className="text-[12px] font-medium text-gray-600 mb-1.5">Gender</div>
          <div className="h-[52px] rounded-[12px] border border-gray-200 bg-white flex items-center px-3 focus-within:border-teal-500 transition-colors">
            <IconUser size={18} className="text-gray-400 mr-2 shrink-0" />
            <select value={gender} onChange={e => setGender(e.target.value)}
              className="flex-1 bg-transparent outline-none text-[14px] text-gray-900 appearance-none cursor-pointer">
              <option value="">Select gender</option>
              {GENDERS.map(g => <option key={g} value={g}>{g}</option>)}
            </select>
          </div>
        </label>

        {}
        <label className="block">
          <div className="text-[12px] font-medium text-gray-600 mb-1.5">Condition / goal</div>
          <div className="h-[52px] rounded-[12px] border border-gray-200 bg-white flex items-center px-3 focus-within:border-teal-500 transition-colors">
            <IconHeart size={18} className="text-gray-400 mr-2 shrink-0" />
            <select value={condition} onChange={e => setCondition(e.target.value)}
              className="flex-1 bg-transparent outline-none text-[14px] text-gray-900 appearance-none cursor-pointer">
              {CONDITIONS.map(c => <option key={c} value={c}>{c}</option>)}
            </select>

        <TextField label="Emergency contact" placeholder="Name & phone number"
          Icon={IconPhone} value={emergency} onChange={setEmergency} />

        {}
        {error && (
          <div className="p-3 rounded-[10px] bg-red-50 border border-red-100 text-red-700 text-[12px] font-medium">

const PrivacySecurityScreen = ({ onBack, onUpdateUser, onDeleteAccount }) => {
  const t = useT();

  
  const [currentPwd, setCurrentPwd] = React.useState('');
  const [newPwd,     setNewPwd]     = React.useState('');
  const [confirmPwd, setConfirmPwd] = React.useState('');
  const [pwdError,   setPwdError]   = React.useState('');
  const [pwdSuccess, setPwdSuccess] = React.useState(false);

  
  const [healthSharing, setHealthSharing] = React.useState(t.healthSharing !== false);
  const [emailNotif,    setEmailNotif]    = React.useState(t.emailNotifications !== false);

  
  const [confirmDelete, setConfirmDelete] = React.useState(false);

  
  const handleChangePassword = () => {
    setPwdError('');
    if (!currentPwd)           { setPwdError('Please enter your current password.'); return; }
    if (newPwd.length < 8)     { setPwdError('New password must be at least 8 characters.'); return; }
    if (newPwd !== confirmPwd) { setPwdError('New passwords do not match.'); return; }

    
    const users = JSON.parse(localStorage.getItem('physiocare_users') || '[]');
    const idx = users.findIndex(u => u.email === t.email);
    if (idx === -1 || users[idx].password !== currentPwd) {
      setPwdError('Current password is incorrect.');
      return;
    }

    
    users[idx] = { ...users[idx], password: newPwd };
    localStorage.setItem('physiocare_users', JSON.stringify(users));

    setCurrentPwd(''); setNewPwd(''); setConfirmPwd('');
    setPwdSuccess(true);
    setTimeout(() => setPwdSuccess(false), 2500);
  };

  
  
  const updatePreference = (key, value) => {
    const users = JSON.parse(localStorage.getItem('physiocare_users') || '[]');
    const idx = users.findIndex(u => u.email === t.email);
    if (idx !== -1) {
      const updatedUser = { ...users[idx], [key]: value };
      users[idx] = updatedUser;
      localStorage.setItem('physiocare_users', JSON.stringify(users));
      onUpdateUser(updatedUser); 
    }
  };

  
  const handleDeleteAccount = () => {
    
    const users = JSON.parse(localStorage.getItem('physiocare_users') || '[]');
    const updated = users.filter(u => u.email !== t.email);
    localStorage.setItem('physiocare_users', JSON.stringify(updated));
    
    localStorage.removeItem('physiocare_session');
    
    onDeleteAccount();
  };

  return (
    <Screen bg="bg-[#F7FAF9]">
      <NavHeader title="Privacy & security" onBack={onBack} />
      <div className="px-5 pb-10 space-y-4">

        {}
        <Card className="p-4 flex items-center gap-3">
          <div className="h-9 w-9 rounded-full bg-teal-100 flex items-center justify-center shrink-0">
            <IconMail size={16} className="text-teal-700" />
          </div>
          <div>
            <div className="text-[11px] text-gray-500">Logged in as</div>
            <div className="text-[13px] font-semibold text-gray-900">{t.email}</div>
          </div>
        </Card>

        {}
        <div className="text-[11px] font-semibold text-gray-400 tracking-wider">CHANGE PASSWORD</div>
        <Card className="p-4 space-y-3">
          <TextField label="Current password" type="password" placeholder="••••••••"
            Icon={IconLock} value={currentPwd} onChange={setCurrentPwd} />
          <TextField label="New password" type="password" placeholder="At least 8 characters"
            Icon={IconLock} value={newPwd} onChange={setNewPwd} />
          <TextField label="Confirm new password" type="password" placeholder="Repeat new password"
            Icon={IconLock} value={confirmPwd} onChange={setConfirmPwd} />
          {pwdError && (
            <div className="p-3 rounded-[10px] bg-red-50 border border-red-100 text-red-700 text-[12px] font-medium">
              {pwdError}
            </div>
          )}
          <PrimaryButton onClick={handleChangePassword} className={pwdSuccess ? '!bg-emerald-500' : ''}>
            {pwdSuccess
              ? <span className="inline-flex items-center gap-2 pop"><IconCheck size={18} /> Password updated</span>
              : 'Update password'}
          </PrimaryButton>
        </Card>

        {}
        <div className="text-[11px] font-semibold text-gray-400 tracking-wider">PRIVACY</div>
        <Card className="divide-y divide-gray-100">
          {}
          <div className="p-4 flex items-center gap-3">
            <div className="flex-1 min-w-0">
              <div className="text-[13px] font-semibold text-gray-900">Health data sharing</div>
              <div className="text-[11px] text-gray-500 mt-0.5 leading-snug">Allow anonymised data to improve PhysioCare</div>
            </div>
            <button
              onClick={() => { const next = !healthSharing; setHealthSharing(next); updatePreference('healthSharing', next); }}
              className={`relative w-11 h-[26px] shrink-0 rounded-full transition-colors ${healthSharing ? 'bg-teal-500' : 'bg-gray-200'}`}>
              <span className={`absolute top-[3px] h-5 w-5 rounded-full bg-white shadow transition-transform ${healthSharing ? 'translate-x-[22px]' : 'translate-x-[3px]'}`} />
            </button>
          </div>
          {}
          <div className="p-4 flex items-center gap-3">
            <div className="flex-1 min-w-0">
              <div className="text-[13px] font-semibold text-gray-900">Email notifications</div>
              <div className="text-[11px] text-gray-500 mt-0.5 leading-snug">Receive recovery reminders and updates by email</div>
            </div>
            <button
              onClick={() => { const next = !emailNotif; setEmailNotif(next); updatePreference('emailNotifications', next); }}
              className={`relative w-11 h-[26px] shrink-0 rounded-full transition-colors ${emailNotif ? 'bg-teal-500' : 'bg-gray-200'}`}>
              <span className={`absolute top-[3px] h-5 w-5 rounded-full bg-white shadow transition-transform ${emailNotif ? 'translate-x-[22px]' : 'translate-x-[3px]'}`} />
            </button>
          </div>
        </Card>

        {}
        <div className="text-[11px] font-semibold text-gray-400 tracking-wider">DANGER ZONE</div>
        {!confirmDelete ? (
          <button onClick={() => setConfirmDelete(true)}
            className="w-full h-12 rounded-[12px] border border-red-200 bg-red-50 text-red-700 text-[13px] font-semibold flex items-center justify-center gap-2 active:bg-red-100">
            Delete my account
          </button>
        ) : (
          <Card className="p-4 border border-red-200">
            <div className="text-[14px] font-bold text-gray-900 mb-1">Are you sure?</div>
            <div className="text-[12px] text-gray-500 mb-4 leading-relaxed">
              This permanently deletes your account and all data. This action cannot be undone.
            </div>
            <div className="flex gap-2">
              <button onClick={() => setConfirmDelete(false)}
                className="flex-1 h-11 rounded-[10px] border border-gray-200 bg-white text-[13px] font-semibold text-gray-700 active:bg-gray-50">
                Cancel
              </button>
              <button onClick={handleDeleteAccount}
                className="flex-1 h-11 rounded-[10px] bg-red-600 active:bg-red-700 text-white text-[13px] font-semibold">
                Yes, delete
              </button>
            </div>
          </Card>
        )}
      </div>
    </Screen>
  );
};

const AssessmentScreen = ({ onBack, onComplete }) => {
  const steps = [
    {
      q: 'Where is your primary pain?',
      opts: ['Lower back', 'Knee', 'Shoulder', 'Neck', 'Hip'],
    },
    {
      q: 'How severe is the pain today?',
      opts: ['Mild (1–3)', 'Moderate (4–6)', 'Severe (7–10)'],
    },
    {
      q: 'How long have you had this pain?',
      opts: ['Less than 1 week', '1–4 weeks', '1–3 months', 'More than 3 months'],
    },
    {
      q: 'What\'s your recovery goal?',
      opts: ['Return to sport', 'Everyday comfort', 'Post-surgery rehab', 'Build strength'],
    },
  ];
  const [step, setStep] = React.useState(0);
  const [answers, setAnswers] = React.useState({});
  const pct = ((step) / steps.length) * 100;
  const current = steps[step];

  const pick = (opt) => {
    setAnswers({ ...answers, [step]: opt });
    if (step < steps.length - 1) setTimeout(() => setStep(step + 1), 180);
    else setTimeout(onComplete, 240);
  };

  return (
    <Screen bg="bg-white">
      <NavHeader title="Assessment" onBack={step === 0 ? onBack : () => setStep(step - 1)}
        right={<div className="text-[11px] font-semibold text-gray-400">{step + 1}/{steps.length}</div>} />
      <div className="px-5">
        <div className="h-1.5 rounded-full bg-gray-100 overflow-hidden">
          <div className="h-full bg-teal-500 transition-all duration-500" style={{ width: `${pct + 100/steps.length}%` }} />
        </div>
      </div>

      <div className="px-5 mt-6">
        <WaveHero className="rounded-[16px] h-28 w-full" />
      </div>

      <div className="px-5 mt-5">
        <div className="text-[11px] font-semibold text-teal-700 tracking-wider">STEP {step + 1}</div>
        <h2 className="text-[22px] font-bold text-gray-900 leading-tight mt-1">{current.q}</h2>
        <p className="text-[13px] text-gray-500 mt-1">Tap the option that best describes you.</p>

        <div className="mt-5 space-y-2.5">
          {current.opts.map((opt) => {
            const selected = answers[step] === opt;
            return (
              <button key={opt} onClick={() => pick(opt)}
                className={`w-full text-left p-4 rounded-[12px] border flex items-center justify-between transition-colors
                  ${selected ? 'border-teal-500 bg-teal-50' : 'border-gray-200 bg-white active:bg-gray-50'}`}>
                <span className={`text-[14px] font-semibold ${selected ? 'text-teal-800' : 'text-gray-900'}`}>{opt}</span>
                <span className={`h-5 w-5 rounded-full border flex items-center justify-center ${selected ? 'border-teal-500 bg-teal-500' : 'border-gray-300'}`}>
                  {selected && <IconCheck size={12} className="text-white" />}
                </span>
              </button>
            );
          })}
        </div>
      </div>
    </Screen>
  );
};

              <li key={i} className="flex gap-2.5">
                <div className="h-5 w-5 rounded-full bg-teal-100 text-teal-700 text-[11px] font-bold flex items-center justify-center shrink-0">{i + 1}</div>
                <div className="text-[13px] text-gray-700 leading-snug">{txt}</div>
              </li>
            ))}
          </ol>
        </div>

        <div className="mt-5 p-3 rounded-[12px] bg-amber-50 border border-amber-100 flex gap-2.5">
          <IconInfo size={16} className="text-amber-600 mt-0.5 shrink-0" />
          <div className="text-[12px] text-amber-800">
            Stop if you feel sharp pain. A gentle stretch is normal.
          </div>
        </div>

        <div className="mt-5 mb-6">
          <PrimaryButton onClick={markDone} className={done ? '!bg-emerald-500' : ''}>
            {done ? (
              <span className="inline-flex items-center gap-2 pop"><IconCheck size={18} /> Marked as done</span>
            ) : 'Mark as done'}
          </PrimaryButton>
        </div>
      </div>
    </React.Fragment>
  );

  if (fromTab) {
    return (
      <Screen withTabs activeTab="exercises" onTabTap={onTabTap} bg="bg-white">
        {content}
      </Screen>
    );
  }
  return <Screen bg="bg-white">{content}</Screen>;
};

Object.assign(window, { AssessmentScreen, RecommendationScreen, ExerciseDetailsScreen, ConsultationScreen });

const { useState, useRef, useEffect } = React;

const TweakCtx = React.createContext({});
window.useT = () => React.useContext(TweakCtx);

const buildCtx = (user) => {
  const nameParts  = (user.name || '').trim().split(' ');
  const firstName  = nameParts[0] || '';
  const lastName   = nameParts.slice(1).join(' ') || '';
  return {
    patientFirst:   firstName,
    patientLast:    lastName,
    patientFull:    user.name  || '',
    patientInitial: firstName.charAt(0).toUpperCase() || '?',
    email:          user.email || '',
    
    phone:              user.phone            || '',
    age:                user.age              || '',
    gender:             user.gender           || '',
    emergencyContact:   user.emergencyContact || '',
    condition:          user.condition        || 'General rehabilitation',
    
    healthSharing:      user.healthSharing      !== false,
    emailNotifications: user.emailNotifications !== false,
    streakDays:     user.streakDays || 0,
    showStreak:     true,
    greetingEmoji:  true,
    
    doctorTitle:  'Dr.',
    doctorFirst:  'Mwanahamisi',
    doctorLast:   'Kombo',
    doctorFull:   'Dr. Mwanahamisi Kombo',
  };
};

const App = () => {
  
  const [currentUser, setCurrentUser] = useState(null);
  const [stack, setStack]             = useState(['splash']);
  const [dir, setDir]                 = useState('none');
  const [selectedExercise, setSelectedExercise] = useState(null);
  const current = stack[stack.length - 1];

  
  useEffect(() => {
    const sessionRaw = localStorage.getItem('physiocare_session');
    if (!sessionRaw) return;
    const session = JSON.parse(sessionRaw);
    const users   = JSON.parse(localStorage.getItem('physiocare_users') || '[]');
    const user    = users.find(u => u.email === session.email);
    if (user) {
      setCurrentUser(user);
      setStack(['dashboard']);
    } else {
      
      localStorage.removeItem('physiocare_session');
    }
  }, []);

  
  const ctx = currentUser ? buildCtx(currentUser) : {
    patientFirst: '', patientLast: '', patientFull: '', patientInitial: '?',
    email: '', condition: '', streakDays: 0, showStreak: false, greetingEmoji: false,
    doctorTitle: 'Dr.', doctorFirst: 'Mwanahamisi', doctorLast: 'Kombo',
    doctorFull: 'Dr. Mwanahamisi Kombo',
  };

  
  const push    = (screen, extra = {}) => {
    setDir('forward');
    setStack(s => [...s, screen]);
    if (extra.exercise) setSelectedExercise(extra.exercise);
  };
  const replace = (screen, transition = 'forward') => {
    setDir(transition);
    setStack(s => [...s.slice(0, -1), screen]);
  };
  const back    = () => {
    if (stack.length <= 1) return;
    setDir('back');
    setStack(s => s.slice(0, -1));
  };
  const resetTo   = (screen) => { setDir('fade'); setStack([screen]); };
  const onTabTap  = (tabId)  => {
    if (tabId === current) return;
    setDir('fade');
    setStack([tabId]);
  };

  
  
  const handleLogin  = (user) => { setCurrentUser(user); resetTo('dashboard'); };

  
  const handleSignup = (user) => { setCurrentUser(user); resetTo('dashboard'); };

  
  const handleLogout = () => {
    localStorage.removeItem('physiocare_session');
    setCurrentUser(null);
    resetTo('splash');
  };

  
  
  const handleUpdateUser = (updatedUser) => {
    setCurrentUser(updatedUser);
    
    localStorage.setItem('physiocare_session', JSON.stringify({ email: updatedUser.email }));
  };

  
  
  const handleDeleteAccount = () => {
    setCurrentUser(null);
    resetTo('splash');
  };

  
  const renderScreen = (id) => {
    switch (id) {
      case 'splash':
        return <SplashScreen onGetStarted={() => push('login')} />;
      case 'login':
        return <LoginScreen onBack={back} onLogin={handleLogin} onSignup={() => replace('signup')} />;
      case 'signup':
        return <SignupScreen onBack={back} onSignup={handleSignup} onLogin={() => replace('login', 'back')} />;
      case 'dashboard':
        return <DashboardScreen onTabTap={onTabTap} onQuickAction={(id) => push(id)} onBook={() => push('consultation')} />;
      case 'assessment':
        return <AssessmentScreen onBack={back} onComplete={() => replace('recommendation')} />;
      case 'exercises':
        return <ExercisesScreen onTabTap={onTabTap} onOpenExercise={(ex) => { setSelectedExercise(ex); push('exerciseDetails'); }} />;
      case 'recommendation':
        return <RecommendationScreen onBack={back} onOpenExercise={(ex) => push('exerciseDetails', { exercise: ex })} />;
      case 'exerciseDetails': {
        const fromTab = stack[0] === 'exercises' && stack.length === 2;
        return <ExerciseDetailsScreen onBack={back} onTabTap={onTabTap} fromTab={fromTab} exercise={selectedExercise} />;
      }
      case 'progress':     return <ProgressScreen onTabTap={onTabTap} />;
      case 'reminders':    return <RemindersScreen onBack={back} />;
      case 'consultation': return <ConsultationScreen onBack={back} />;
      case 'profile':
        return <ProfileScreen onTabTap={onTabTap} onLogout={handleLogout} onNavigate={push} />;
      
      case 'personalInfo':
        return <PersonalInfoScreen onBack={back} onSave={handleUpdateUser} />;
      case 'privacySecurity':
        return <PrivacySecurityScreen onBack={back} onUpdateUser={handleUpdateUser} onDeleteAccount={handleDeleteAccount} />;
      case 'helpSupport':
        return <HelpSupportScreen onBack={back} />;
      
      case 'healthProfile':
      case 'notifications':
        return (
          <Screen bg="bg-[#F7FAF9]">
            <NavHeader title={id === 'healthProfile' ? 'Health profile' : 'Notifications'} onBack={back} />
            <div className="flex flex-col items-center justify-center px-8 text-center py-24">
              <div className="h-16 w-16 rounded-full bg-teal-100 flex items-center justify-center mb-4">
                {id === 'healthProfile'
                  ? <IconHeart size={24} className="text-teal-700" />
                  : <IconBell size={24} className="text-teal-700" />}
              </div>
              <div className="text-[17px] font-bold text-gray-900">Coming soon</div>
              <div className="text-[13px] text-gray-500 mt-2 leading-relaxed">This section is under development.</div>
            </div>
          </Screen>
        );
      default: return <div className="p-8 text-gray-500">Unknown screen: {id}</div>;
    }
  };

  return (
    
    <TweakCtx.Provider value={ctx}>
      {}
      <div className="phone-host min-h-screen flex items-center justify-center p-6">
        <PhoneFrame>
          <ScreenTransition keyId={current} direction={dir}>
            {renderScreen(current)}
          </ScreenTransition>
        </PhoneFrame>
      </div>
    </TweakCtx.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>
</html>
